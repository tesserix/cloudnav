name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Cumulative cloud SDK deps push each per-platform link to
    # ~1.5–2 GB peak. Building 4–5 platforms in parallel OOM-kills
    # the 7 GB ubuntu-latest runner; the kill manifests as a silent
    # 25-minute timeout in goreleaser logs. 60 min budget is generous;
    # we expect 6–8 min wall-time with parallelism=2.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          # --parallelism=2 caps simultaneous platform builds at 2
          # (instead of goreleaser's CPU-derived default of 4) so
          # peak memory stays under the runner ceiling.
          args: build --snapshot --clean --parallelism=2
