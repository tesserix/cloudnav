name: dependabot auto-merge

# Auto-merge Dependabot PRs â€” and ONLY Dependabot â€” once this repo's CI checks
# pass. Human PRs are never touched. Build-gating happens INSIDE this job (it
# waits for the PR's own check runs to finish) so it works even when CI is
# path-filtered and there is no single always-run check to require in branch
# protection â€” and it never deadlocks unrelated human PRs.
#
# Requires a Dependabot secret DEPENDABOT_PAT (a maintainer PAT with Pull
# requests + Contents write on this repo; set org-wide for tesserix). Without it
# the job stays green and no-ops.

on: pull_request

permissions:
  contents: read
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for maintainer PAT
        id: gate
        env:
          DEPENDABOT_PAT: ${{ secrets.DEPENDABOT_PAT }}
        run: |
          if [ -n "$DEPENDABOT_PAT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPENDABOT_PAT not set â€” skipping auto-merge."
          fi

      # Build gate: wait for every other check run on this PR's head commit to
      # finish, and fail (so we do NOT merge) if any failed. This is what makes
      # "merge once all builds pass" work without static required-checks.
      - name: Wait for this PR's CI checks to pass
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ok=""
          for i in $(seq 1 40); do          # up to ~20 min
            json=$(gh api "repos/$REPO/commits/$SHA/check-runs" --paginate 2>/dev/null || echo '{"check_runs":[]}')
            others=$(echo "$json" | jq '[.check_runs[] | select(.name | test("auto-merge"; "i") | not)]')
            total=$(echo "$others" | jq 'length')
            pending=$(echo "$others" | jq '[.[] | select(.status != "completed")] | length')
            failed=$(echo "$others" | jq '[.[] | select(.conclusion != null and (.conclusion | IN("success","skipped","neutral") | not))] | length')
            echo "poll $i: total=$total pending=$pending failed=$failed"
            if [ "$failed" -gt 0 ]; then echo "::error::a CI check failed â€” not auto-merging"; exit 1; fi
            if [ "$total" -gt 0 ] && [ "$pending" -eq 0 ]; then ok=1; break; fi
            if [ "$total" -eq 0 ] && [ "$i" -ge 6 ]; then echo "no CI checks for this PR â€” nothing to gate on"; ok=1; break; fi
            sleep 30
          done
          [ -n "$ok" ] || { echo "::error::timed out waiting for CI checks"; exit 1; }

      - name: Approve as maintainer
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      # Direct squash-merge â€” the gate above already confirmed every check is
      # green. (`--auto` would never fire on a repo with no required-check
      # branch protection, so it would just sit enabled and never merge.)
      # --admin: the "Protect main branch" ruleset's update rule rejects the
      # plain merge API even for bypass actors; the admin override is the only
      # path that lands the merge. Safe because the gate above has already
      # required every other check to pass.
      - name: Merge
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --squash --delete-branch --admin "$PR_URL"
